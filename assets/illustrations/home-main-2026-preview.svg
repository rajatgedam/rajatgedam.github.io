<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="homeTitle homeDesc">
  <title id="homeTitle">2026 portfolio hero illustration preview</title>
  <desc id="homeDesc">A modern product engineering dashboard with agent workflows, deployment metrics, and layered glassmorphism panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061124" />
      <stop offset="55%" stop-color="#0a1d3c" />
      <stop offset="100%" stop-color="#123565" />
    </linearGradient>
    <radialGradient id="glowA" cx="22%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#75a8ff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#75a8ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="24%" r="50%">
      <stop offset="0%" stop-color="#75e1d5" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#75e1d5" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8bb6ff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#75e1d5" stop-opacity="0.22" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#75a8ff" />
      <stop offset="100%" stop-color="#75e1d5" />
    </linearGradient>
    <filter id="blur-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22" />
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#020814" flood-opacity="0.45" />
    </filter>
    <pattern id="microGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#d9e8ff" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="900" rx="36" fill="url(#bg)" />
  <rect width="1200" height="900" rx="36" fill="url(#microGrid)" />
  <circle cx="240" cy="180" r="260" fill="url(#glowA)" />
  <circle cx="980" cy="180" r="240" fill="url(#glowB)" />
  <circle cx="930" cy="130" r="92" fill="#75e1d5" fill-opacity="0.12" filter="url(#blur-lg)" />
  <circle cx="190" cy="760" r="120" fill="#75a8ff" fill-opacity="0.12" filter="url(#blur-lg)" />

  <g filter="url(#shadow)">
    <rect x="126" y="118" width="948" height="650" rx="32" fill="#08172f" fill-opacity="0.8" stroke="url(#panelStroke)" stroke-width="2" />
    <rect x="126" y="118" width="948" height="68" rx="32" fill="#0d2344" fill-opacity="0.88" />
    <circle cx="170" cy="152" r="8" fill="#ff8e8e" />
    <circle cx="198" cy="152" r="8" fill="#ffd48b" />
    <circle cx="226" cy="152" r="8" fill="#75e1d5" />
    <rect x="270" y="136" width="268" height="30" rx="15" fill="#10284d" />
    <text x="300" y="156" fill="#adc3e8" font-size="16" font-family="'Space Grotesk', sans-serif">agent workspace / product delivery</text>

    <rect x="164" y="220" width="234" height="510" rx="24" fill="#0b1c37" fill-opacity="0.88" stroke="#75a8ff" stroke-opacity="0.18" />
    <text x="194" y="262" fill="#e9f2ff" font-size="18" font-family="'Space Grotesk', sans-serif">Active pipelines</text>
    <text x="194" y="292" fill="#75e1d5" font-size="13" font-family="'Space Grotesk', sans-serif" letter-spacing="2">LIVE ORCHESTRATION</text>

    <g font-family="'Space Grotesk', sans-serif">
      <rect x="192" y="328" width="178" height="74" rx="20" fill="#11294d" />
      <circle cx="224" cy="365" r="11" fill="#75e1d5" />
      <text x="248" y="360" fill="#e9f2ff" font-size="16">AI review bot</text>
      <text x="248" y="382" fill="#adc3e8" font-size="12">PR analysis • risk tagging</text>

      <rect x="192" y="420" width="178" height="74" rx="20" fill="#11294d" />
      <circle cx="224" cy="457" r="11" fill="#75a8ff" />
      <text x="248" y="452" fill="#e9f2ff" font-size="16">Cloud deploy</text>
      <text x="248" y="474" fill="#adc3e8" font-size="12">Docker • CI • observability</text>

      <rect x="192" y="512" width="178" height="74" rx="20" fill="#11294d" />
      <circle cx="224" cy="549" r="11" fill="#ffd48b" />
      <text x="248" y="544" fill="#e9f2ff" font-size="16">Vector context</text>
      <text x="248" y="566" fill="#adc3e8" font-size="12">Retrieval • session memory</text>
    </g>

    <path d="M 281 402 C 281 414, 281 414, 281 420" stroke="#75e1d5" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round" />
    <path d="M 281 494 C 281 506, 281 506, 281 512" stroke="#75a8ff" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round" />

    <rect x="430" y="220" width="608" height="260" rx="28" fill="#0c1b33" fill-opacity="0.92" stroke="#75e1d5" stroke-opacity="0.18" />
    <text x="470" y="264" fill="#e9f2ff" font-size="26" font-family="'Space Grotesk', sans-serif">Agent-ready product systems</text>
    <text x="470" y="300" fill="#adc3e8" font-size="16" font-family="'Space Grotesk', sans-serif">Human-in-the-loop delivery, runtime telemetry, and cloud-native release discipline.</text>

    <g>
      <rect x="472" y="334" width="138" height="38" rx="19" fill="#11294d" />
      <text x="504" y="358" fill="#75e1d5" font-size="15" font-family="'Space Grotesk', sans-serif">agentic review</text>
      <rect x="626" y="334" width="128" height="38" rx="19" fill="#11294d" />
      <text x="657" y="358" fill="#75a8ff" font-size="15" font-family="'Space Grotesk', sans-serif">cloud runtime</text>
      <rect x="770" y="334" width="142" height="38" rx="19" fill="#11294d" />
      <text x="803" y="358" fill="#ffd48b" font-size="15" font-family="'Space Grotesk', sans-serif">prompt telemetry</text>
    </g>

    <g stroke="url(#accentLine)" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M 480 424 C 540 390, 590 392, 634 420 C 674 446, 718 456, 770 432 C 816 410, 860 364, 932 384" />
      <path d="M 480 444 C 542 424, 594 434, 650 452 C 700 468, 760 480, 834 452 C 878 434, 918 404, 976 420" stroke-opacity="0.35" />
    </g>
    <circle cx="634" cy="420" r="8" fill="#75e1d5" />
    <circle cx="770" cy="432" r="8" fill="#75a8ff" />
    <circle cx="932" cy="384" r="8" fill="#ffd48b" />

    <rect x="430" y="510" width="370" height="184" rx="26" fill="#0c1b33" fill-opacity="0.94" stroke="#75a8ff" stroke-opacity="0.18" />
    <text x="466" y="554" fill="#e9f2ff" font-size="20" font-family="'Space Grotesk', sans-serif">Release summary</text>
    <text x="466" y="586" fill="#adc3e8" font-size="14" font-family="'Space Grotesk', sans-serif">Shipped faster with review automation, stronger feedback loops, and measured outcomes.</text>

    <g font-family="'Space Grotesk', sans-serif">
      <text x="466" y="640" fill="#75e1d5" font-size="34" font-weight="700">46%</text>
      <text x="536" y="640" fill="#e9f2ff" font-size="15">more code shipped</text>
      <text x="466" y="674" fill="#75a8ff" font-size="34" font-weight="700">55%</text>
      <text x="536" y="674" fill="#e9f2ff" font-size="15">faster task completion</text>
    </g>

    <rect x="826" y="510" width="212" height="184" rx="26" fill="#0c1b33" fill-opacity="0.94" stroke="#75e1d5" stroke-opacity="0.18" />
    <text x="858" y="554" fill="#e9f2ff" font-size="20" font-family="'Space Grotesk', sans-serif">System blend</text>
    <g font-family="'Space Grotesk', sans-serif" font-size="14">
      <rect x="858" y="586" width="150" height="26" rx="13" fill="#11294d" />
      <text x="882" y="604" fill="#adc3e8">React + TypeScript</text>
      <rect x="858" y="620" width="150" height="26" rx="13" fill="#11294d" />
      <text x="890" y="638" fill="#adc3e8">.NET + Blazor</text>
      <rect x="858" y="654" width="150" height="26" rx="13" fill="#11294d" />
      <text x="892" y="672" fill="#adc3e8">AI + Postgres</text>
    </g>
  </g>

  <g opacity="0.85" font-family="'Space Grotesk', sans-serif">
    <text x="140" y="820" fill="#adc3e8" font-size="16">Draft concept: 2026 interface language with glass panels, telemetry, and human-guided AI workflows.</text>
  </g>
</svg>